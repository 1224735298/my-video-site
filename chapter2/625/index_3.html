<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="referrer" content="strict-origin-when-cross-origin">
    <title>行路者·抉择|互动视频</title>
    <style>
        /* ===== 样式保持不变 ===== */
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(145deg, #0a0f1e 0%, #0c1222 100%);
            font-family: system-ui, -apple-system, 'Segoe UI', 'Roboto', Helvetica, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 0px
        }

        .app-container {
            width: 100%;
            max-width: 650px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 12px
        }

        .title-section {
            text-align: center;
            margin: 0 16px 4px 16px
        }

        .main-title {
            font-size: 2.2rem;
            font-weight: 800;
            letter-spacing: 4px;
            background: linear-gradient(135deg, #FFF9C4, #FFE0A3);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
            line-height: 1.2
        }

        .sub-title {
            font-size: 0.9rem;
            font-weight: 500;
            letter-spacing: 2px;
            color: #c9d4ff;
            text-shadow: 0 1px 3px rgba(0, 0, 0, 0.3);
            margin-top: 4px;
            opacity: 0.9
        }

        @supports not(background-clip:text) {
            .main-title {
                color: #ffdf8c
            }
        }

        .video-card {
            background: rgba(20, 28, 40, 0.75);
            backdrop-filter: blur(4px);
            border-radius: 32px;
            overflow: hidden;
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.4);
            margin: 0 1px
        }

        .video-wrapper {
            position: relative;
            background: #000;
            width: 100%;
            aspect-ratio: 16/9;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block
        }

        /* ===== 隐藏默认控件中不需要的部分 ===== */
        video::-webkit-media-controls-volume-slider,
        video::-webkit-media-controls-volume-control-container {
            display: none !important;
        }
        video::-webkit-media-controls-picture-in-picture-button {
            display: none !important;
        }
        video::-webkit-media-controls-fullscreen-button {
            display: none !important;
        }
        video::-internal-media-controls-download-button {
            display: none !important;
        }
        video::-webkit-media-controls-time-remaining-display {
            display: none !important;
        }

        .center-icon {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 70px;
            height: 70px;
            background: rgba(0, 0, 0, 0.65);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(6px);
            pointer-events: none;
            transition: opacity 0.2s ease;
            z-index: 10
        }

        .center-icon svg {
            width: 36px;
            height: 36px;
            fill: white;
            stroke: none;
            display: block
        }

        .center-icon.hidden-icon {
            opacity: 0;
            visibility: hidden
        }

        .video-loader {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 60px;
            height: 60px;
            background: rgba(0, 0, 0, 0.65);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(4px);
            z-index: 15;
            transition: opacity 0.2s ease
        }

        .video-loader.hidden-loader {
            display: none
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top: 3px solid white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg)
            }
            100% {
                transform: rotate(360deg)
            }
        }

        .info-bar {
            padding: 10px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(12, 18, 28, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 240, 0.1)
        }

        .scene-badge {
            background: #1f2a3e;
            padding: 5px 12px;
            border-radius: 40px;
            font-size: 0.7rem;
            font-weight: 500;
            color: #b9e2ff
        }

        .replay-btn {
            background: rgba(255, 255, 255, 0.08);
            border: none;
            color: #ccd9f0;
            font-size: 1rem;
            padding: 6px 12px;
            border-radius: 40px;
            display: flex;
            align-items: center;
            gap: 5px;
            cursor: pointer;
            font-weight: 500;
            transition: 0.1s
        }

        .replay-btn:active {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(0.96)
        }

        .options-panel {
            padding: 16px 16px 20px;
            background: rgba(18, 24, 36, 0.96);
            backdrop-filter: blur(16px);
            border-top: 1px solid rgba(255, 255, 240, 0.1)
        }

        .options-title {
            text-align: center;
            font-size: 0.75rem;
            letter-spacing: 2px;
            color: #9aabcf;
            margin-bottom: 12px
        }

        .button-group {
            display: flex;
            gap: 14px;
            justify-content: center;
            position: relative;
        }

        .option-btn {
            flex: 1;
            padding: 12px 8px;
            border: none;
            border-radius: 60px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: 0.1s;
            background: #1e2a3a;
            color: #eef4ff;
            box-shadow: 0 3px 8px rgba(0, 0, 0, 0.2);
            max-width: 220px;
            position: relative;
        }

        .option-btn:active {
            transform: scale(0.96)
        }

        .option-a {
            background: linear-gradient(135deg, #2c3e66, #1a2a48);
            border-bottom: 3px solid #5f9eff
        }

        .option-b {
            background: linear-gradient(135deg, #5e3a2c, #3f2a1e);
            border-bottom: 3px solid #ffa45f
        }

        .option-btn-single {
            width: 80%;
            margin: 0 auto;
            display: block;
            background: linear-gradient(135deg, #2c3e66, #1a2a48);
            border-bottom: 3px solid #5f9eff;
            max-width: 280px
        }

        .guide-finger {
            position: absolute;
            top: -45px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 2rem;
            pointer-events: none;
            z-index: 20;
            animation: fingerTap 1.2s ease-in-out infinite;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
        }

        @keyframes fingerTap {
            0% {
                transform: translateX(-50%) translateY(0) scale(1);
                opacity: 1;
            }
            50% {
                transform: translateX(-50%) translateY(15px) scale(0.8);
                opacity: 0.8;
            }
            100% {
                transform: translateX(-50%) translateY(0) scale(1);
                opacity: 1;
            }
        }

        .hidden {
            display: none
        }

        .history-control {
            margin-top: 4px;
            display: flex;
            justify-content: flex-end;
            padding: 0 16px
        }

        .toggle-history-btn {
            background: rgba(30, 40, 60, 0.9);
            border: none;
            border-radius: 40px;
            padding: 8px 18px;
            color: #ffdfa5;
            font-size: 0.85rem;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            backdrop-filter: blur(8px);
            cursor: pointer;
            transition: 0.1s
        }

        .toggle-history-btn:active {
            transform: scale(0.96);
            background: #2a3a5e
        }

        .history-sidebar {
            background: rgba(15, 20, 30, 0.95);
            backdrop-filter: blur(12px);
            border-radius: 28px;
            padding: 14px 12px;
            margin: 8px 16px 0 16px;
            transition: all 0.2s ease;
            border: 1px solid rgba(255, 255, 200, 0.15)
        }

        .history-sidebar.collapsed {
            display: none
        }

        .history-header {
            font-size: 0.9rem;
            font-weight: 600;
            color: #d9e2ff;
            padding-bottom: 8px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.15);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px
        }

        .history-list {
            display: flex;
            flex-wrap: nowrap;
            overflow-x: auto;
            gap: 10px;
            padding-bottom: 6px;
            scrollbar-width: thin;
            -webkit-overflow-scrolling: touch
        }

        .history-item {
            background: rgba(25, 32, 48, 0.8);
            border-radius: 40px;
            padding: 8px 16px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            white-space: nowrap;
            flex-shrink: 0;
            transition: 0.1s;
            border-left: 3px solid #4b6a9b
        }

        .history-item.active {
            background: linear-gradient(135deg, #2a3a5a, #1f2e4a);
            border-left-color: #ffb347
        }

        .history-item:active {
            transform: scale(0.96)
        }

        .history-title {
            font-size: 0.8rem;
            font-weight: 500;
            color: #eef3ff
        }

        .history-badge {
            font-size: 0.65rem;
            background: #ffb34730;
            padding: 3px 8px;
            border-radius: 30px;
            color: #ffcd94
        }

        .empty-history {
            text-align: center;
            color: #7e8eb0;
            padding: 12px;
            font-size: 0.75rem;
            width: 100%
        }

        .credits {
            text-align: center;
            font-size: 0.7rem;
            color: #8d9dc0;
            padding: 12px 16px 16px;
            opacity: 0.8;
            letter-spacing: 1px;
            line-height: 1.4
        }

        .toast-msg {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #d32f2fdd;
            backdrop-filter: blur(8px);
            color: white;
            padding: 6px 16px;
            border-radius: 50px;
            font-size: 0.75rem;
            z-index: 300;
            pointer-events: none
        }

        button {
            touch-action: manipulation
        }

        .path-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(12px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 400
        }

        .path-modal-content {
            background: #1a2438;
            border-radius: 32px;
            width: 85%;
            max-width: 400px;
            max-height: 70vh;
            overflow-y: auto;
            padding: 20px;
            border: 1px solid #ffdfa5;
            box-shadow: 0 20px 35px rgba(0, 0, 0, 0.5)
        }

        .path-modal-content h3 {
            color: #ffdfa5;
            text-align: center;
            margin-top: 0;
            margin-bottom: 16px
        }

        .path-list {
            background: #0f1725;
            border-radius: 24px;
            padding: 12px 16px;
            margin-bottom: 20px;
            max-height: 300px;
            overflow-y: auto
        }

        .path-item {
            padding: 8px 0;
            border-bottom: 1px solid #2a3a5a;
            color: #eef3ff;
            font-size: 0.9rem
        }

        .path-item:last-child {
            border-bottom: none
        }

        .close-modal-btn {
            background: #ffb347;
            border: none;
            padding: 10px 20px;
            border-radius: 40px;
            font-weight: bold;
            font-size: 1rem;
            width: 100%;
            cursor: pointer;
            color: #1f1a12
        }

        .close-modal-btn:active {
            transform: scale(0.97)
        }
    </style>
</head>
<body>
<div class="app-container">
    <div class="title-section">
        <div class="main-title">行路者·抉择</div>
        <div class="sub-title">第二章&nbsp;&nbsp;立身•为民之择</div>
    </div>
    <div class="video-card">
        <div class="video-wrapper" id="videoWrapper">
            <!-- 关键修改：添加 disablepictureinpicture 禁用画中画，添加 controls 和 controlslist -->
            <video id="storyVideo" preload="metadata" playsinline webkit-playsinline
                   controls
                   controlslist="nofullscreen nodownload noremoteplayback"
                   disablepictureinpicture>
            </video>
            <div id="centerIcon" class="center-icon">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M8 5v14l11-7z" fill="white"/>
                </svg>
            </div>
            <div id="videoLoader" class="video-loader hidden-loader">
                <div class="spinner"></div>
            </div>
        </div>
        <div class="info-bar"><span class="scene-badge" id="sceneNameLabel">🎬序章</span>
            <button class="replay-btn" id="replayButton">↻重播</button>
        </div>
        <div id="optionsPanel" class="options-panel hidden">
            <div class="options-title">⚡选择分支⚡</div>
            <div class="button-group" id="buttonsContainer"></div>
        </div>
    </div>
    <div class="history-control">
        <button id="toggleHistoryBtn" class="toggle-history-btn">📜进度回溯▼</button>
    </div>
    <div id="historySidebar" class="history-sidebar collapsed">
        <div class="history-header"><span>📖已完成章节(点击回溯至末尾重选)</span></div>
        <div id="historyListContainer" class="history-list">
            <div class="empty-history">✨完成剧情后，章节会出现在这里</div>
        </div>
    </div>
    <div class="credits">本片根据真实案例改编<br/>致敬每一位在基层默默奉献的党员干部<br/>你的每一次选择，都在书写你的人生
    </div>
    <div class="credits">蓬溪县纪委监委</div>
</div>
<script>
    // ======================== 原有 JavaScript 保持不变 ========================
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function (m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m
        }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function (c) {
            return c
        })
    }

    const PLAY_PATH_D = "M8 5v14l11-7z";
    const PAUSE_PATH_D = "M6 5h4v14H6z M14 5h4v14h-4z";
    const encryptedZel = "aHR0cHM6Ly92aWRlby0xMjU3OTY4MTUyLmNvcy5hcC1jaG9uZ3FpbmcubXlxY2xvdWQuY29tL3YyL2xvdy8=";
    const zel = atob(encryptedZel);
    const VIDEO_SOURCES = {
        pt: zel + "pt.mp4",
        v111: zel + "111.mp4",
        v111_xz: zel + "111_xz.mp4",
        v111_ss: zel + "111_ss.mp4",
        v111_jj: zel + "111_jj.mp4",

        v222: zel + "222.mp4",
        v222_xz: zel + "222_xz.mp4",
        v222_ss: zel + "222_ss.mp4",
        v222_jj: zel + "222_jj.mp4",

        v333: zel + "333.mp4",
        v333_xz: zel + "333_xz.mp4",
        v333_ss: zel + "333_ss.mp4",
        v333_jj: zel + "333_jj.mp4",

        v444: zel + "444.mp4",
        v444_xz: zel + "444_xz.mp4",
        v444_ss: zel + "444_ss.mp4",
        v444_jj: zel + "444_jj.mp4",

        v555: zel + "555.mp4",

    };
    const VIDEO_GRAPH = {
        "pt": {
            title: "🎬 立身•为民之择",
            videoUrl: VIDEO_SOURCES.pt,
            isStart: true,
            options: [
                { text: "【开启游戏】", nextNode: "v111", guide: true }
            ]
        },
        "v111": {title: "似是而非的数据", videoUrl: VIDEO_SOURCES.v111, autoNext: "v111_xz"},
        "v111_xz": {
            title: "似是而非的抉择",
            videoUrl: VIDEO_SOURCES.v111_xz,
            options: [{text: "A · 篡改数据", nextNode: "v111_jj"}, {text: "B · 依规上报", nextNode: "v111_ss"}]
        },
        "v111_jj": {title: "篡改数据", videoUrl: VIDEO_SOURCES.v111_jj, autoNext: "v222"},
        "v111_ss": {title: "依规上报", videoUrl: VIDEO_SOURCES.v111_ss, autoNext: "v222"},

        "v222": {title: "浮沉消弭的底色", videoUrl: VIDEO_SOURCES.v222, autoNext: "v222_xz"},
        "v222_xz": {
            title: "浮沉消弭的抉择",
            videoUrl: VIDEO_SOURCES.v222_xz,
            options: [{text: "A · 视若无睹", nextNode: "v222_jj"}, {text: "B · 主动服务", nextNode: "v222_ss"}]
        },
        "v222_jj": {title: "视若无睹", videoUrl: VIDEO_SOURCES.v222_jj, autoNext: "v333"},
        "v222_ss": {title: "主动服务", videoUrl: VIDEO_SOURCES.v222_ss, autoNext: "v444"},

        "v333": {title: "王总的请求", videoUrl: VIDEO_SOURCES.v333, autoNext: "v333_xz"},
        "v333_xz": {
            title: "王总请求的抉择",
            videoUrl: VIDEO_SOURCES.v333_xz,
            options: [{text: "A · 热心办理", nextNode: "v333_ss"}, {text: "B · 一视同仁", nextNode: "v333_jj"}]
        },
        "v333_jj": {title: "一视同仁", videoUrl: VIDEO_SOURCES.v333_jj, options: [{text: "返回重新选择", nextNode: "v222", type: "rechoice"}]},
        "v333_ss": {title: "热心办理", videoUrl: VIDEO_SOURCES.v333_ss, options: [{text: "返回重新选择", nextNode: "v222", type: "rechoice"}]},

        "v444": {title: "似曾相识的邀请", videoUrl: VIDEO_SOURCES.v444, autoNext: "v444_xz"},
        "v444_xz": {
            title: "似曾相识的抉择",
            videoUrl: VIDEO_SOURCES.v444_xz,
            options: [{text: "A · 欣然应邀", nextNode: "v444_ss"}, {text: "B · 果断拒绝", nextNode: "v444_jj"}]
        },
        "v444_jj": {title: "果断拒绝", videoUrl: VIDEO_SOURCES.v444_jj, options: [{text: "继续剧情", nextNode: "v555"}]},
        "v444_ss": {title: "🌲 主任的邀约", videoUrl: VIDEO_SOURCES.v444_ss, options: [{text: "返回重新选择", nextNode: "v444", type: "rechoice"}]},

        "v555": {
            title: "🌟 下章预告",
            videoUrl: VIDEO_SOURCES.v555,
            isEnd: true,
            options: [{text: "A · 本章结束", nextNode: "pt", type: "end"}, {
                text: "再玩一次",
                nextNode: "pt",
                type: "restart"
            }]
        }
    };

    function getStartNodeId() {
        for (let [id, node] of Object.entries(VIDEO_GRAPH)) {
            if (node.isStart === true) return id
        }
        return Object.keys(VIDEO_GRAPH)[0]
    }

    function isEndNode(nodeId) {
        const node = ensureNode(nodeId);
        return node.isEnd === true
    }

    function ensureNode(nodeId) {
        return VIDEO_GRAPH[nodeId] || VIDEO_GRAPH[getStartNodeId()]
    }

    function getOptions(nodeId) {
        const node = ensureNode(nodeId);
        let opts = node.options;
        if (!opts || opts.length === 0) return [{text: "继续", nextNode: getStartNodeId()}];
        return opts
    }

    const video = document.getElementById('storyVideo');
    const videoWrapper = document.getElementById('videoWrapper');
    const centerIcon = document.getElementById('centerIcon');
    const videoLoader = document.getElementById('videoLoader');
    const optionsPanel = document.getElementById('optionsPanel');
    const btnsContainer = document.getElementById('buttonsContainer');
    const sceneLabel = document.getElementById('sceneNameLabel');
    const replayBtn = document.getElementById('replayButton');
    const historyContainer = document.getElementById('historyListContainer');
    const toggleHistoryBtn = document.getElementById('toggleHistoryBtn');
    const historySidebar = document.getElementById('historySidebar');
    let historyNodes = [];
    let currentHistoryIdx = -1;
    let currentNodeId = getStartNodeId();
    let isTransition = false;
    let isJumpback = false;
    let currentEndedHandler = null;
    let isLoading = false;
    let loadTimeout = null;
    let progressTimer = null;

    function setLoading(loading) {
        isLoading = loading;
        if (loading) {
            videoLoader.classList.remove('hidden-loader');
            centerIcon.classList.add('hidden-icon')
        } else {
            videoLoader.classList.add('hidden-loader');
            updateCenterIconVisibility()
        }
    }

    function showLoader() {
        setLoading(true)
    }

    function hideLoader() {
        setLoading(false)
    }

    function updateCenterIconVisibility() {
        if (isLoading) return;
        const svgElem = centerIcon.querySelector('svg');
        if (!svgElem) return;
        if (video.paused) {
            centerIcon.classList.remove('hidden-icon');
            let pathElem = svgElem.querySelector('path');
            if (!pathElem) {
                pathElem = document.createElementNS("http://www.w3.org/2000/svg", "path");
                svgElem.appendChild(pathElem)
            }
            pathElem.setAttribute('d', PLAY_PATH_D);
            pathElem.setAttribute('fill', 'white')
        } else {
            centerIcon.classList.add('hidden-icon')
        }
    }

    function clearLoadMonitoring() {
        if (loadTimeout) clearTimeout(loadTimeout);
        if (progressTimer) clearInterval(progressTimer);
        loadTimeout = null;
        progressTimer = null
    }

    function startLoadMonitoring() {
        clearLoadMonitoring();
        showLoader();
        loadTimeout = setTimeout(() => {
            if (video.readyState < 2 && !video.ended && !isLoading) {
                showLoader();
                showMsg("网络加载缓慢，请检查网络", false)
            }
        }, 8000);
        let lastBuffered = video.buffered.length ? video.buffered.end(0) : 0;
        progressTimer = setInterval(() => {
            if (video.readyState >= 2) {
                hideLoader();
                clearInterval(progressTimer);
                progressTimer = null;
                return
            }
            const currentBuffered = video.buffered.length ? video.buffered.end(0) : 0;
            if (currentBuffered === lastBuffered && video.readyState < 2 && !video.seeking && !video.ended) {
                if (isLoading) showMsg("网络卡顿，正在缓冲...", false)
            }
            lastBuffered = currentBuffered
        }, 5000)
    }

    function retryLoadCurrentVideo() {
        if (isTransition) return;
        const node = ensureNode(currentNodeId);
        if (!node) return;
        if (currentEndedHandler) video.removeEventListener('ended', currentEndedHandler);
        video.pause();
        video.src = node.videoUrl;
        video.load();
        const onEnded = () => {
            if (!isTransition) {
                recordCurrentNodeToHistory();
                if (node.autoNext) loadNode(node.autoNext); else showOptions(false)
            }
            video.removeEventListener('ended', onEnded);
            currentEndedHandler = null
        };
        video.addEventListener('ended', onEnded);
        currentEndedHandler = onEnded;
        startLoadMonitoring();
        video.play().catch(err => showMsg("自动播放失败，请点击视频", false))
    }

    function bindVideoLoadEvents() {
        video.addEventListener('loadstart', startLoadMonitoring);
        video.addEventListener('waiting', startLoadMonitoring);
        video.addEventListener('stalled', () => {
            startLoadMonitoring();
            showMsg("网络卡顿，正在缓冲...", false)
        });
        video.addEventListener('canplay', () => {
            hideLoader();
            clearLoadMonitoring()
        });
        video.addEventListener('canplaythrough', () => {
            hideLoader();
            clearLoadMonitoring()
        });
        video.addEventListener('playing', () => {
            hideLoader();
            clearLoadMonitoring()
        });
        video.addEventListener('ended', () => {
            hideLoader();
            clearLoadMonitoring()
        });
        video.addEventListener('error', (e) => {
            hideLoader();
            clearLoadMonitoring();
            let errorMsg = "视频加载失败";
            if (video.error) {
                switch (video.error.code) {
                    case 1:
                        errorMsg = "视频加载被中止";
                        break;
                    case 2:
                        errorMsg = "网络错误，无法加载视频";
                        break;
                    case 3:
                        errorMsg = "视频解码失败";
                        break;
                    case 4:
                        errorMsg = "视频地址无效";
                        break;
                    default:
                        errorMsg = "视频加载失败"
                }
            }
            if (!navigator.onLine) errorMsg = "网络已断开，请检查网络连接";
            showMsg(errorMsg, true)
        });
        window.addEventListener('online', () => {
            showMsg("网络已恢复", false);
            if (video.readyState < 2 && !video.ended) retryLoadCurrentVideo()
        });
        window.addEventListener('offline', () => {
            showMsg("网络已断开", true);
            startLoadMonitoring()
        })
    }

    function showMsg(msg, isErr = true) {
        let t = document.querySelector('.toast-msg');
        if (t) t.remove();
        let div = document.createElement('div');
        div.className = 'toast-msg';
        div.textContent = msg;
        if (isErr) div.style.background = "#c62828cc"; else div.style.background = "#2c6e2ccc";
        document.body.appendChild(div);
        setTimeout(() => div.remove(), 3500)
    }

    function hideOptions() {
        optionsPanel.classList.add('hidden')
    }

    function clearHistory() {
        historyNodes = [];
        currentHistoryIdx = -1;
        renderHistoryList()
    }

    function showPathModalAsync() {
        return new Promise((resolve) => {
            const modal = document.createElement('div');
            modal.className = 'path-modal';
            const contentDiv = document.createElement('div');
            contentDiv.className = 'path-modal-content';
            const titleH3 = document.createElement('h3');
            titleH3.textContent = '📜 你选择的道路';
            const pathListDiv = document.createElement('div');
            pathListDiv.className = 'path-list';
            const closeBtn = document.createElement('button');
            closeBtn.className = 'close-modal-btn';
            closeBtn.textContent = '关闭';
            if (historyNodes.length === 0) {
                const emptyMsg = document.createElement('div');
                emptyMsg.className = 'path-item';
                emptyMsg.textContent = '暂无记录';
                pathListDiv.appendChild(emptyMsg)
            } else {
                for (let i = 0; i < historyNodes.length; i++) {
                    const nid = historyNodes[i];
                    const node = VIDEO_GRAPH[nid];
                    if (node) {
                        const itemDiv = document.createElement('div');
                        itemDiv.className = 'path-item';
                        itemDiv.textContent = `${i + 1}.${node.title}`;
                        pathListDiv.appendChild(itemDiv)
                    }
                }
            }
            contentDiv.appendChild(titleH3);
            contentDiv.appendChild(pathListDiv);
            contentDiv.appendChild(closeBtn);
            modal.appendChild(contentDiv);
            document.body.appendChild(modal);
            closeBtn.addEventListener('click', () => {
                modal.remove();
                resolve()
            })
        })
    }

    // 切换播放/暂停
    function togglePlayPause() {
        if (isLoading) {
            showMsg("视频加载中，请稍后...", false);
            return
        }
        if (video.paused) {
            video.play().catch(err => {
                showMsg("播放失败", false);
                startLoadMonitoring()
            })
        } else {
            video.pause()
        }
    }

    function jumpToNodeEnd(targetNodeId, callbackAfterEnd = null) {
        if (isTransition) return;
        isTransition = true;
        isJumpback = true;
        hideOptions();
        const node = ensureNode(targetNodeId);
        currentNodeId = targetNodeId;
        sceneLabel.textContent = `↺${node.title}(回溯重选)`;
        if (currentEndedHandler) video.removeEventListener('ended', currentEndedHandler);
        video.pause();
        video.src = node.videoUrl;
        video.load();
        const seekToEnd = () => {
            if (video.duration && isFinite(video.duration)) {
                video.currentTime = Math.max(0, video.duration - 2);
                video.play().catch(err => showMsg("点击画面播放", false))
            } else {
                setTimeout(() => {
                    if (video.duration && isFinite(video.duration)) {
                        video.currentTime = video.duration - 2;
                        video.play().catch(e => console.log)
                    } else video.play().catch(e => console.log)
                }, 300)
            }
        };
        const onLoaded = () => {
            video.removeEventListener('loadedmetadata', onLoaded);
            seekToEnd()
        };
        video.addEventListener('loadedmetadata', onLoaded);
        if (video.readyState >= 1) onLoaded();
        const onEnded = () => {
            sceneLabel.textContent = node.title;
            isJumpback = false;
            isTransition = false;
            if (callbackAfterEnd) callbackAfterEnd(); else {
                if (node.autoNext) loadNode(node.autoNext); else showOptions(true)
            }
            video.removeEventListener('ended', onEnded);
            currentEndedHandler = null
        };
        video.addEventListener('ended', onEnded);
        currentEndedHandler = onEnded;
        setTimeout(() => {
            if (isTransition && video.currentTime >= video.duration - 0.2 && !video.ended && currentEndedHandler) currentEndedHandler()
        }, 2000);
        setTimeout(() => {
            if (isTransition) {
                isTransition = false;
                isJumpback = false
            }
        }, 5000)
    }

    let currentGuideFinger = null;

    function showOptions(skipRecord = false) {
        if (isTransition) return;
        const opts = getOptions(currentNodeId);
        btnsContainer.innerHTML = '';
        const handlePick = async (nextNode, opt) => {
            if (isTransition) return;
            if (!nextNode) nextNode = getStartNodeId();
            if (currentGuideFinger && currentGuideFinger.parentNode) {
                currentGuideFinger.remove();
                currentGuideFinger = null;
            }
            if (opt.type === "end") {
                await showPathModalAsync();
                return
            }
            if (opt.type === "restart") {
                clearHistory();
                loadNode(getStartNodeId());
                return
            }
            if (opt.type === "rechoice") {
                jumpToNodeEnd(nextNode);
                return
            }
            if (!skipRecord && !isJumpback) recordCurrentNodeToHistory();
            if (ensureNode(nextNode).isStart === true) clearHistory();
            loadNode(nextNode)
        };

        if (opts.length === 1) {
            const btn = document.createElement('button');
            btn.className = 'option-btn option-btn-single';
            btn.textContent = opts[0].text;
            btn.onclick = () => handlePick(opts[0].nextNode, opts[0]);
            btnsContainer.appendChild(btn);
            const opt = opts[0];
            if (ensureNode(currentNodeId).isStart === true && opt.guide === true) {
                if (currentGuideFinger && currentGuideFinger.parentNode) currentGuideFinger.remove();
                const finger = document.createElement('div');
                finger.className = 'guide-finger';
                finger.textContent = '👇';
                btn.style.position = 'relative';
                finger.style.position = 'absolute';
                finger.style.top = '-45px';
                finger.style.left = '50%';
                finger.style.transform = 'translateX(-50%)';
                finger.style.pointerEvents = 'none';
                btn.appendChild(finger);
                currentGuideFinger = finger;
                setTimeout(() => {
                    if (currentGuideFinger && currentGuideFinger.parentNode) {
                        currentGuideFinger.remove();
                        currentGuideFinger = null;
                    }
                }, 8000);
            }
        } else {
            const btnA = document.createElement('button');
            btnA.className = 'option-btn option-a';
            btnA.textContent = opts[0].text;
            const btnB = document.createElement('button');
            btnB.className = 'option-btn option-b';
            btnB.textContent = opts[1].text;
            btnA.onclick = () => handlePick(opts[0].nextNode, opts[0]);
            btnB.onclick = () => handlePick(opts[1].nextNode, opts[1]);
            btnsContainer.appendChild(btnA);
            btnsContainer.appendChild(btnB)
        }
        optionsPanel.classList.remove('hidden')
    }

    function recordCurrentNodeToHistory() {
        if (isJumpback) return;
        const existingIdx = historyNodes.indexOf(currentNodeId);
        if (existingIdx !== -1) {
            if (existingIdx !== currentHistoryIdx + 1) {
                historyNodes = historyNodes.slice(0, existingIdx + 1);
                currentHistoryIdx = existingIdx
            } else currentHistoryIdx = existingIdx
        } else {
            if (currentHistoryIdx + 1 < historyNodes.length) historyNodes = historyNodes.slice(0, currentHistoryIdx + 1);
            historyNodes.push(currentNodeId);
            currentHistoryIdx = historyNodes.length - 1
        }
        renderHistoryList()
    }

    function renderHistoryList() {
        if (!historyContainer) return;
        if (!historyNodes.length) {
            historyContainer.innerHTML = '';
            const emptyDiv = document.createElement('div');
            emptyDiv.className = 'empty-history';
            emptyDiv.textContent = '✨ 完成剧情后，点击回溯';
            historyContainer.appendChild(emptyDiv);
            return
        }
        const frag = document.createDocumentFragment();
        historyNodes.forEach((nid, idx) => {
            const node = VIDEO_GRAPH[nid];
            if (!node) return;
            const item = document.createElement('div');
            item.className = 'history-item';
            if (idx === currentHistoryIdx) item.classList.add('active');
            const titleSpan = document.createElement('span');
            titleSpan.className = 'history-title';
            titleSpan.textContent = `${idx + 1}.${node.title}`;
            const badge = document.createElement('span');
            badge.className = 'history-badge';
            badge.textContent = '回溯';
            item.appendChild(titleSpan);
            item.appendChild(badge);
            item.addEventListener('click', (e) => {
                e.stopPropagation();
                if (isTransition) {
                    showMsg("请稍后，剧情切换中...");
                    return
                }
                jumpToHistoryNode(nid, idx)
            });
            frag.appendChild(item)
        });
        historyContainer.innerHTML = '';
        historyContainer.appendChild(frag)
    }

    async function jumpToHistoryNode(targetNodeId, targetIndex) {
        if (isTransition) return;
        isTransition = true;
        isJumpback = true;
        hideOptions();
        const node = ensureNode(targetNodeId);
        currentNodeId = targetNodeId;
        sceneLabel.textContent = `↺${node.title}(回溯)`;
        if (currentEndedHandler) video.removeEventListener('ended', currentEndedHandler);
        video.pause();
        video.src = node.videoUrl;
        video.load();
        const seekToEnd = () => {
            if (video.duration && isFinite(video.duration)) {
                video.currentTime = Math.max(0, video.duration - 2);
                video.play().catch(err => showMsg("点击画面播放", false))
            } else {
                setTimeout(() => {
                    if (video.duration && isFinite(video.duration)) {
                        video.currentTime = video.duration - 2;
                        video.play().catch(e => console.log)
                    } else video.play().catch(e => console.log)
                }, 300)
            }
        };
        const onLoaded = () => {
            video.removeEventListener('loadedmetadata', onLoaded);
            seekToEnd()
        };
        video.addEventListener('loadedmetadata', onLoaded);
        if (video.readyState >= 1) onLoaded();
        const onEnded = () => {
            currentHistoryIdx = targetIndex;
            currentNodeId = targetNodeId;
            sceneLabel.textContent = node.title;
            renderHistoryList();
            isJumpback = false;
            isTransition = false;
            if (node.autoNext) loadNode(node.autoNext); else showOptions(true);
            video.removeEventListener('ended', onEnded);
            currentEndedHandler = null
        };
        video.addEventListener('ended', onEnded);
        currentEndedHandler = onEnded;
        setTimeout(() => {
            if (isTransition && video.currentTime >= video.duration - 0.2 && !video.ended && currentEndedHandler) currentEndedHandler()
        }, 2000);
        setTimeout(() => {
            if (isTransition) {
                isTransition = false;
                isJumpback = false
            }
        }, 5000)
    }

    async function loadNode(nextNodeId, autoPlay = true) {
        if (isTransition) return;
        isTransition = true;
        hideOptions();
        const node = ensureNode(nextNodeId);
        currentNodeId = nextNodeId;
        sceneLabel.textContent = node.title;
        if (currentEndedHandler) video.removeEventListener('ended', currentEndedHandler);
        video.pause();
        video.src = node.videoUrl;
        video.load();
        const onEnded = async () => {
            if (!isTransition) {
                recordCurrentNodeToHistory();
                if (node.autoNext) {
                    loadNode(node.autoNext)
                } else if (isEndNode(currentNodeId)) {
                    await showPathModalAsync();
                    showOptions(false)
                } else {
                    showOptions(false)
                }
            }
            isTransition = false;
            video.removeEventListener('ended', onEnded);
            currentEndedHandler = null
        };
        video.addEventListener('ended', onEnded);
        currentEndedHandler = onEnded;
        if (autoPlay) {
            try {
                await video.play()
            } catch (err) {
                showMsg("自动播放失败，请点击视频", false)
            }
        }
        isTransition = false
    }

    function replayCurrent() {
        if (isTransition) return;
        hideOptions();
        if (currentEndedHandler) video.removeEventListener('ended', currentEndedHandler);
        const onReplayEnd = () => {
            if (!isTransition) {
                recordCurrentNodeToHistory();
                const node = ensureNode(currentNodeId);
                if (node.autoNext) loadNode(node.autoNext, true); else showOptions(false)
            }
            video.removeEventListener('ended', onReplayEnd);
            currentEndedHandler = null
        };
        video.addEventListener('ended', onReplayEnd);
        currentEndedHandler = onReplayEnd;
        video.currentTime = 0;
        video.play().catch(err => showMsg("请点击视频重播", false))
    }

    function initGame() {
        clearHistory();
        isJumpback = false;
        isTransition = false;
        const startNodeId = getStartNodeId();
        currentNodeId = startNodeId;
        const startNode = VIDEO_GRAPH[startNodeId];
        sceneLabel.textContent = startNode.title;
        if (currentEndedHandler) video.removeEventListener('ended', currentEndedHandler);
        video.src = startNode.videoUrl;
        video.load();
        video.pause();
        const onEnded = () => {
            recordCurrentNodeToHistory();
            const node = ensureNode(currentNodeId);
            if (node.autoNext) loadNode(node.autoNext, true); else showOptions(false);
            video.removeEventListener('ended', onEnded);
            currentEndedHandler = null
        };
        video.addEventListener('ended', onEnded);
        currentEndedHandler = onEnded;
        video.addEventListener('play', updateCenterIconVisibility);
        video.addEventListener('pause', updateCenterIconVisibility);
        updateCenterIconVisibility()
    }

    let panelVisible = false;
    toggleHistoryBtn.addEventListener('click', () => {
        panelVisible = !panelVisible;
        if (panelVisible) {
            historySidebar.classList.remove('collapsed');
            toggleHistoryBtn.textContent = '📜 进度回溯 ▲'
        } else {
            historySidebar.classList.add('collapsed');
            toggleHistoryBtn.textContent = '📜 进度回溯 ▼'
        }
    });

    // ===== 修复移动端点击视频无法切换播放/暂停 =====
    // 使用 pointerup 事件，兼容 PC 和移动端，且能区分点击视频本身与点击控件
    video.addEventListener('pointerup', function(e) {
        // 只有点击目标为视频元素本身时才触发切换（控件点击不会触发）
        if (e.target === this) {
            togglePlayPause();
        }
    });

    replayBtn.addEventListener('click', replayCurrent);
    historySidebar.classList.add('collapsed');
    bindVideoLoadEvents();
    initGame();
    console.log("互动视频已启动 | 画中画已禁用，点击视频可切换播放/暂停（兼容移动端）");
</script>
</body>
</html>
